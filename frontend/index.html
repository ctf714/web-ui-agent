<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI看手相小工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .upload-section {
            margin: 30px 0;
        }
        
        #fileInput {
            display: none;
        }
        
        .upload-btn {
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .preview-section {
            margin: 30px 0;
        }
        
        #previewImage {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            border: 2px dashed #ddd;
        }
        
        .analyze-btn {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .analyze-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .result-section {
            margin-top: 30px;
            text-align: left;
        }
        
        .result-card {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }
        
        .result-card h3::before {
            content: '🔮';
            margin-right: 10px;
        }
        
        .result-content {
            color: #333;
            line-height: 1.7;
        }
        
        .result-content p {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        
        .result-content p::before {
            content: '•';
            color: #667eea;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        
        .result-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .result-summary h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .result-summary p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .ai-model-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            font-style: italic;
        }
        
        .share-section {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .share-btn {
            background: #ff6b6b;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .share-btn:hover {
            background: #ee5a52;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }
        
        .share-btn::before {
            margin-right: 8px;
            font-size: 16px;
        }
        
        #shareXiaohongshu::before {
            content: '📱';
        }
        
        #saveResult::before {
            content: '💾';
        }
        
        .premium-section {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            color: white;
            text-align: center;
        }
        
        .premium-section h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .premium-section p {
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .premium-btn {
            background: white;
            color: #f5576c;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .premium-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }
        
        .loading {
            display: none;
            margin: 20px 0;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #667eea;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #ff6b6b;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI看手相小工具</h1>
        
        <div class="upload-section">
            <label for="fileInput" class="upload-btn">点击上传手相照片</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview-section">
            <img id="previewImage" src="" alt="手相预览">
        </div>
        
        <button class="analyze-btn" id="analyzeBtn">开始分析</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析，请稍候...</p>
        </div>
        
        <div class="result-section" id="resultSection">
            <!-- 分析结果将显示在这里 -->
        </div>
        
        <div class="share-section" id="shareSection">
            <button class="share-btn" id="shareXiaohongshu">分享到小红书</button>
            <button class="share-btn" id="saveResult">保存结果</button>
        </div>
        
        <div class="premium-section">
            <h3>🔒 解锁高级分析</h3>
            <p>订阅会员，享受更详细的手相分析、个性化建议和更多独家功能</p>
            <button class="premium-btn" id="premiumBtn">立即订阅会员</button>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('fileInput');
            const previewImage = document.getElementById('previewImage');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const shareSection = document.getElementById('shareSection');
            
            // 预览上传的图片
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewImage.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 开始分析
            analyzeBtn.addEventListener('click', function() {
                const file = fileInput.files[0];
                if (!file) {
                    alert('请先上传手相照片');
                    return;
                }
                
                loading.classList.add('show');
                resultSection.innerHTML = '';
                
                // 创建FormData对象
                const formData = new FormData();
                formData.append('handImage', file);
                
                // 调用后端API进行分析
                fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    loading.classList.remove('show');
                    
                    if (data.success) {
                        // 显示结果
                        const result = data.result;
                        const models = ['DeepSeek', '千问', '智谱'];
                        
                        resultSection.innerHTML = `
                            <div class="result-summary">
                                <h2>手相分析报告</h2>
                                <p>以下分析由DeepSeek、千问、智谱三家AI模型联合生成，仅供参考</p>
                            </div>
                            <div class="result-card">
                                <h3>感情分析</h3>
                                <div class="result-content">
                                    ${result.love.map((item, index) => `
                                        <p>${item}
                                            <span class="ai-model-label">— ${models[index]}</span>
                                        </p>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="result-card">
                                <h3>事业分析</h3>
                                <div class="result-content">
                                    ${result.career.map((item, index) => `
                                        <p>${item}
                                            <span class="ai-model-label">— ${models[index]}</span>
                                        </p>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="result-card">
                                <h3>财运分析</h3>
                                <div class="result-content">
                                    ${result.wealth.map((item, index) => `
                                        <p>${item}
                                            <span class="ai-model-label">— ${models[index]}</span>
                                        </p>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="result-card">
                                <h3>健康分析</h3>
                                <div class="result-content">
                                    ${result.health.map((item, index) => `
                                        <p>${item}
                                            <span class="ai-model-label">— ${models[index]}</span>
                                        </p>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                        
                        shareSection.style.display = 'block';
                    } else {
                        resultSection.innerHTML = `<div class="error-message">${data.error}</div>`;
                    }
                })
                .catch(error => {
                    loading.classList.remove('show');
                    resultSection.innerHTML = `<div class="error-message">分析失败，请重试</div>`;
                    console.error('分析失败:', error);
                });
            });
            
            // 分享到小红书
            document.getElementById('shareXiaohongshu').addEventListener('click', function() {
                // 生成分享内容
                const result = document.getElementById('resultSection').innerText;
                const shareContent = `【AI手相分析】\n\n${result.substring(0, 500)}...\n\n想知道你的手相隐藏了什么秘密吗？快来试试AI看手相小工具吧！`;
                
                // 模拟小红书分享
                if (navigator.share) {
                    // 使用Web Share API
                    navigator.share({
                        title: 'AI手相分析报告',
                        text: shareContent,
                        url: window.location.href
                    });
                } else {
                    // 复制到剪贴板
                    navigator.clipboard.writeText(shareContent).then(function() {
                        alert('分享内容已复制到剪贴板，打开小红书粘贴即可分享！');
                    }).catch(function() {
                        alert('分享功能暂时不可用，请手动复制内容分享。');
                    });
                }
            });
            
            // 保存结果
            document.getElementById('saveResult').addEventListener('click', function() {
                const result = document.getElementById('resultSection').innerText;
                const blob = new Blob([result], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `手相分析报告_${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('分析报告已保存到本地！');
            });
            
            // 会员订阅
            document.getElementById('premiumBtn').addEventListener('click', function() {
                alert('会员订阅功能开发中，敬请期待！');
            });
        });
    </script>
</body>
</html>
